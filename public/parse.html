<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频解析</title>
    <link rel="stylesheet" href="/tailwind.css?v=2.1.5">
    <link rel="stylesheet" href="/theme.css?v=2.2.7">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        body {
            background: transparent;
            color: #111827;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(15, 23, 42, 0.10);
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .nav-item {
            transition: all 0.3s ease;
        }
        
        .nav-item.active {
            color: #2563eb;
        }
        
        .content-wrapper {
            padding-bottom: calc(140px + env(safe-area-inset-bottom));
        }
        
        .nav-bar {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="page-parse">
    <header class="glass-effect sticky top-0 z-40 px-4 py-3">
        <div class="flex items-center justify-between max-w-6xl mx-auto">
            <div class="flex items-center space-x-3">
                <button onclick="history.back()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800">视频解析</h1>
            </div>
            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
            </div>
        </div>
    </header>

    <main class="content-wrapper max-w-6xl mx-auto px-4 py-6">
        <div class="glass-effect rounded-2xl p-6 mb-6 shadow-lg parse-config-card">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold">解</span>
                    </div>
                    <div>
                        <div class="text-base font-semibold text-gray-800">解析服务配置</div>
                        <div class="text-xs text-gray-500">配置会保存在当前浏览器中</div>
                    </div>
                </div>
                <button id="toggleConfigBtn" type="button" class="parse-btn parse-btn-secondary parse-btn-sm">展开配置</button>
            </div>
            <div id="configPanel" class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-4 hidden parse-config-panel">
                <div class="md:col-span-3 parse-field">
                    <div class="text-xs text-gray-600 mb-1 parse-field-label">接口地址</div>
                    <input id="baseUrlInput" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm" placeholder="http://192.168.5.41:8086" />
                </div>
                <div class="parse-field">
                    <div class="text-xs text-gray-600 mb-1 parse-field-label">账号</div>
                    <input id="usernameInput" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm" placeholder="admin" />
                </div>
                <div class="parse-field">
                    <div class="text-xs text-gray-600 mb-1 parse-field-label">密码</div>
                    <input id="passwordInput" type="password" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm" placeholder="admin" />
                </div>
                <div class="parse-field flex items-end">
                    <button id="resetConfigBtn" type="button" class="parse-btn parse-btn-secondary w-full">恢复默认配置</button>
                </div>
                <div class="md:col-span-3 text-xs text-gray-500 parse-config-hint">
                    建议填写完整地址（包含 <code>http://</code> 或 <code>https://</code>），配置会自动保存到当前浏览器。
                </div>
            </div>
        </div>

        <div class="glass-effect rounded-2xl p-6 mb-6 shadow-lg parse-input-card">
            <div class="flex items-center justify-between gap-3 mb-4">
                <h2 class="text-lg font-semibold text-gray-800">分享链接/文案</h2>
                <button id="pasteBtn" type="button" class="parse-btn parse-btn-secondary parse-btn-sm">粘贴剪贴板</button>
            </div>
            <p class="text-sm text-gray-500 mb-3 parse-input-hint">粘贴完整分享文案或单独链接。支持中文、符号和多行文本。</p>
            <textarea id="shareInput" class="w-full min-h-[220px] px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm resize-none" placeholder="示例：&#10;7.23 hTY:/ 复制打开抖音，看看【xxx】的视频&#10;https://v.douyin.com/xxxxxxxx/"></textarea>
            <div class="flex items-center justify-between gap-3 mt-4 flex-wrap">
                <div id="statusText" class="text-xs text-gray-500"></div>
                <div class="flex items-center gap-3 parse-primary-actions">
                    <button id="clearBtn" type="button" class="parse-btn parse-btn-secondary">清空</button>
                    <button id="parseBtn" type="button" class="parse-btn parse-btn-primary">开始解析</button>
                </div>
            </div>
        </div>

        <div id="resultSection" class="glass-effect rounded-2xl p-6 shadow-lg hidden parse-result-card">
            <div class="parse-result-head mb-4">
                <div class="flex items-center gap-3 min-w-0 flex-1 overflow-hidden">
                    <img id="authorAvatar" class="w-10 h-10 rounded-full bg-gray-200 object-cover" alt="" />
                    <div class="flex-1 min-w-0">
                        <div id="authorName" class="text-sm font-semibold text-gray-800 truncate"></div>
                        <div id="videoTitle" class="text-xs text-gray-500 parse-video-title"></div>
                    </div>
                </div>
                <div class="parse-pill">解析完成</div>
            </div>

            <div class="parse-media-shell rounded-xl overflow-hidden bg-black">
                <video id="videoPlayer" controls playsinline class="w-full h-auto"></video>
            </div>

            <div class="parse-subcard mt-4">
                <div class="parse-subtitle">快捷操作</div>
                <div class="parse-tool-grid grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
                    <button id="copyLinkBtn" type="button" class="parse-btn parse-btn-secondary">复制视频链接</button>
                    <button id="copyTextBtn" type="button" class="parse-btn parse-btn-secondary">复制文案</button>
                    <a id="downloadVideoBtn" class="parse-btn parse-btn-secondary text-center" href="#" download>保存视频</a>
                    <a id="downloadCoverBtn" class="parse-btn parse-btn-secondary text-center" href="#" download>保存封面</a>
                </div>
            </div>

            <div class="parse-subcard parse-source-card mt-4">
                <div class="parse-subtitle">来源链接</div>
                <div class="parse-source-url text-xs text-gray-500 mt-2">
                    <span id="sourceUrlText"></span>
                </div>
            </div>

            <div class="parse-subcard mt-4">
                <div class="parse-subtitle">发布到首页</div>
                <div class="parse-result-actions mt-3">
                    <button id="publishTextToHomeBtn" type="button" class="parse-btn parse-btn-secondary">发布文案到首页</button>
                    <button id="extractAudioToHomeBtn" type="button" class="parse-btn parse-btn-primary">提取音频到首页</button>
                    <button id="publishBtn" type="button" class="parse-btn parse-btn-primary">发布视频到首页</button>
                </div>
            </div>
        </div>
        <div class="h-24"></div>
    </main>

    <nav class="nav-bar">
        <div class="flex items-center justify-around py-2">
            <a href="/" class="nav-item flex flex-col items-center py-2 px-4 text-gray-500">

    <script src="/main.js?v=2.2.5"></script>
    <script>
        const LS_KEYS = {
            baseUrl: 'video_parser_base_url',
            username: 'video_parser_username',
            password: 'video_parser_password'
        };

        const el = (id) => document.getElementById(id);

        const statusText = el('statusText');
        const toggleConfigBtn = el('toggleConfigBtn');
        const configPanel = el('configPanel');
        const baseUrlInput = el('baseUrlInput');
        const usernameInput = el('usernameInput');
        const passwordInput = el('passwordInput');
        const shareInput = el('shareInput');
        const parseBtn = el('parseBtn');
        const clearBtn = el('clearBtn');
        const pasteBtn = el('pasteBtn');
        const resetConfigBtn = el('resetConfigBtn');

        const resultSection = el('resultSection');
        const authorAvatar = el('authorAvatar');
        const authorName = el('authorName');
        const videoTitle = el('videoTitle');
        const videoPlayer = el('videoPlayer');
        const copyLinkBtn = el('copyLinkBtn');
        const copyTextBtn = el('copyTextBtn');
        const downloadVideoBtn = el('downloadVideoBtn');
        const downloadCoverBtn = el('downloadCoverBtn');
        const sourceUrlText = el('sourceUrlText');
        const publishBtn = el('publishBtn');
        const extractAudioToHomeBtn = el('extractAudioToHomeBtn');
        const publishTextToHomeBtn = el('publishTextToHomeBtn');

        const state = { parsed: null, sourceUrl: '', publishedVideo: null };
        const DEFAULT_CONFIG = {
            baseUrl: '192.168.5.41:8086',
            username: 'admin',
            password: 'admin'
        };

        function syncConfigToggleLabel() {
            const hidden = configPanel.classList.contains('hidden');
            toggleConfigBtn.textContent = hidden ? '展开配置' : '收起配置';
        }

        function loadConfig() {
            baseUrlInput.value = localStorage.getItem(LS_KEYS.baseUrl) || DEFAULT_CONFIG.baseUrl;
            usernameInput.value = localStorage.getItem(LS_KEYS.username) || DEFAULT_CONFIG.username;
            passwordInput.value = localStorage.getItem(LS_KEYS.password) || DEFAULT_CONFIG.password;
        }

        function saveConfig() {
            localStorage.setItem(LS_KEYS.baseUrl, baseUrlInput.value.trim());
            localStorage.setItem(LS_KEYS.username, usernameInput.value.trim());
            localStorage.setItem(LS_KEYS.password, passwordInput.value);
        }

        function setStatus(text, tone) {
            statusText.textContent = text || '';
            statusText.className = 'text-xs ' + (tone === 'error' ? 'text-red-600' : (tone === 'success' ? 'text-green-600' : 'text-gray-500'));
        }

        async function copyText(value) {
            const text = typeof value === 'string' ? value : '';
            if (!text) return false;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch {}
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                const ok = document.execCommand('copy');
                ta.remove();
                return ok;
            } catch {}
            return false;
        }

        function buildProxyUrl(url, opts) {
            const q = new URLSearchParams();
            q.set('url', url);
            if (opts && opts.download) q.set('download', '1');
            if (opts && opts.filename) q.set('filename', opts.filename);
            return '/api/video-parser/proxy?' + q.toString();
        }

        function renderResult(parsed, sourceUrl) {
            state.parsed = parsed;
            state.sourceUrl = sourceUrl || '';
            state.publishedVideo = null;

            const data = parsed && parsed.data ? parsed.data : null;
            const author = data && data.author ? data.author : null;

            authorAvatar.src = (author && author.avatar) ? buildProxyUrl(author.avatar) : '';
            authorName.textContent = (author && author.name) ? author.name : '';
            videoTitle.textContent = data && data.title ? data.title : '';
            sourceUrlText.textContent = state.sourceUrl || '';

            const videoUrl = data && data.video_url ? data.video_url : '';
            const coverUrl = data && data.cover_url ? data.cover_url : '';

            if (coverUrl) videoPlayer.poster = buildProxyUrl(coverUrl);
            videoPlayer.src = videoUrl ? buildProxyUrl(videoUrl) : '';

            const titleSafe = (data && data.title ? data.title : 'video').slice(0, 40);
            downloadVideoBtn.href = videoUrl ? buildProxyUrl(videoUrl, { download: true, filename: titleSafe + '.mp4' }) : '#';
            downloadCoverBtn.href = coverUrl ? buildProxyUrl(coverUrl, { download: true, filename: titleSafe + '.webp' }) : '#';

            resultSection.classList.remove('hidden');
        }

        function buildCaptionText(data) {
            if (!data) return '';
            const title = data && data.title ? String(data.title) : '';
            const author = data && data.author ? data.author : null;
            const authorName = author && author.name ? String(author.name) : '';
            const parts = [];
            if (title.trim()) parts.push(title.trim());
            if (authorName.trim()) parts.push(`@${authorName.trim()}`);
            if (state.sourceUrl) parts.push(state.sourceUrl);
            return parts.join('\n').trim();
        }

        function getAsrPublicBaseUrl() {
            try {
                const raw = localStorage.getItem('mediaShareSettings');
                if (!raw) return window.location.origin;
                const obj = JSON.parse(raw);
                if (obj && typeof obj.asrPublicBaseUrl === 'string' && obj.asrPublicBaseUrl.trim()) {
                    return obj.asrPublicBaseUrl.trim();
                }
            } catch {}
            return window.location.origin;
        }

        function toast(message, type) {
            if (window.app && typeof window.app.showNotification === 'function') {
                return window.app.showNotification(message, type);
            }
            return { remove: () => {} };
        }

        async function monitorTask(taskId) {
            let lastIndex = -1;
            let activeToast = null;

            while (true) {
                const resp = await fetch(`/api/tasks/${encodeURIComponent(taskId)}`);
                const json = await resp.json().catch(() => null);
                if (!resp.ok || !json || json.success !== true) {
                    const msg = json && json.message ? String(json.message) : '任务查询失败';
                    throw new Error(msg);
                }

                const task = json.data || {};
                const steps = Array.isArray(task.steps) ? task.steps : [];
                const status = typeof task.status === 'string' ? task.status : 'running';
                const error = typeof task.error === 'string' ? task.error : '';

                if (steps.length - 1 > lastIndex) {
                    for (let i = lastIndex + 1; i < steps.length; i += 1) {
                        const m = steps[i] && typeof steps[i].message === 'string' ? steps[i].message : '';
                        if (m) {
                            if (activeToast) activeToast.remove();
                            activeToast = toast(m, 'loading');
                            setStatus(m, '');
                        }
                        lastIndex = i;
                    }
                }

                if (status !== 'running') {
                    if (activeToast) activeToast.remove();
                    if (status === 'success') {
                        toast('完成', 'success');
                        setStatus('完成（返回首页即可看到）', 'success');
                        return;
                    }
                    const msg = error || '失败';
                    toast(msg, 'error');
                    setStatus(msg, 'error');
                    throw new Error(msg);
                }

                await new Promise((r) => setTimeout(r, 1500));
            }
        }

        async function runTask({ endpoint, payload, button, idleText, runningText }) {
            if (button) {
                button.disabled = true;
                button.textContent = runningText;
            }
            const startToast = toast('任务已提交', 'loading');
            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload || {})
                });
                const json = await resp.json().catch(() => null);
                if (!resp.ok || !json || json.success !== true) {
                    const msg = json && json.message ? String(json.message) : '任务创建失败';
                    throw new Error(msg);
                }
                const taskId = json && json.data && typeof json.data.taskId === 'string' ? json.data.taskId : '';
                if (!taskId) throw new Error('任务创建失败');
                startToast.remove();
                await monitorTask(taskId);
            } finally {
                if (startToast) startToast.remove();
                if (button) {
                    button.disabled = false;
                    button.textContent = idleText;
                }
            }
        }

        async function parse() {
            saveConfig();
            const baseUrl = baseUrlInput.value.trim();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const input = shareInput.value || '';

            if (!baseUrl) return setStatus('请先填写接口地址', 'error');
            if (!username || !password) return setStatus('请先填写账号密码', 'error');
            if (!input.trim()) return setStatus('请粘贴分享文本或链接', 'error');

            setStatus('解析中...', '');
            parseBtn.disabled = true;
            parseBtn.textContent = '解析中...';
            resultSection.classList.add('hidden');
            state.parsed = null;

            try {
                const resp = await fetch('/api/video-parser/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ baseUrl, username, password, input })
                });
                const json = await resp.json().catch(() => null);
                if (!resp.ok || !json || json.success !== true) {
                    const msg = json && json.message ? json.message : '解析失败';
                    setStatus(msg, 'error');
                    return;
                }
                const remote = json.data;
                if (!remote || remote.code !== 200 || !remote.data) {
                    setStatus((remote && remote.msg) ? remote.msg : '解析失败', 'error');
                    return;
                }
                renderResult(remote, json.sourceUrl);
                setStatus('解析成功', 'success');
            } catch (e) {
                setStatus('网络错误，请重试', 'error');
            } finally {
                parseBtn.disabled = false;
                parseBtn.textContent = '开始解析';
            }
        }

        async function publish() {
            const parsed = state.parsed;
            const data = parsed && parsed.data ? parsed.data : null;
            if (!data || !data.video_url) {
                setStatus('没有可发布的视频', 'error');
                return;
            }
            const author = data.author || {};
            setStatus('准备发布...', '');
            await runTask({
                endpoint: '/api/video-parser/tasks/publish',
                payload: {
                    videoUrl: data.video_url,
                    coverUrl: data.cover_url || '',
                    title: data.title || '',
                    authorName: author.name || '',
                    sourceUrl: state.sourceUrl || ''
                },
                button: publishBtn,
                idleText: '发布视频到首页',
                runningText: '发布中...'
            });
        }

        async function publishCaptionToHome() {
            const parsed = state.parsed;
            const data = parsed && parsed.data ? parsed.data : null;
            if (!data || !data.video_url) {
                setStatus('没有可识别的视频', 'error');
                return;
            }
            setStatus('准备识别...', '');
            await runTask({
                endpoint: '/api/video-parser/tasks/asr-text',
                payload: {
                    videoUrl: data.video_url,
                    publicBaseUrl: getAsrPublicBaseUrl(),
                    language: ''
                },
                button: publishTextToHomeBtn,
                idleText: '发布文案到首页',
                runningText: '识别中...'
            });
        }

        async function extractAudioToHome() {
            const parsed = state.parsed;
            const data = parsed && parsed.data ? parsed.data : null;
            if (!data || !data.video_url) {
                setStatus('没有可提取音频的视频', 'error');
                return;
            }
            const author = data.author || {};
            setStatus('准备提取...', '');
            await runTask({
                endpoint: '/api/video-parser/tasks/extract-audio',
                payload: {
                    videoUrl: data.video_url,
                    title: data.title || '',
                    authorName: author.name || '',
                    sourceUrl: state.sourceUrl || ''
                },
                button: extractAudioToHomeBtn,
                idleText: '提取音频到首页',
                runningText: '提取中...'
            });
        }

        toggleConfigBtn.addEventListener('click', () => {
            configPanel.classList.toggle('hidden');
            syncConfigToggleLabel();
        });
        resetConfigBtn.addEventListener('click', () => {
            baseUrlInput.value = DEFAULT_CONFIG.baseUrl;
            usernameInput.value = DEFAULT_CONFIG.username;
            passwordInput.value = DEFAULT_CONFIG.password;
            saveConfig();
            setStatus('已恢复默认配置', 'success');
        });
        baseUrlInput.addEventListener('input', saveConfig);
        usernameInput.addEventListener('input', saveConfig);
        passwordInput.addEventListener('input', saveConfig);
        parseBtn.addEventListener('click', parse);
        clearBtn.addEventListener('click', () => {
            shareInput.value = '';
            setStatus('', '');
            resultSection.classList.add('hidden');
            state.parsed = null;
        });
        pasteBtn.addEventListener('click', async () => {
            try {
                if (!navigator.clipboard || !window.isSecureContext) {
                    shareInput.focus();
                    setStatus('请手动粘贴，或使用 Ctrl/Cmd+V', '');
                    return;
                }
                const txt = await navigator.clipboard.readText();
                if (!txt) {
                    setStatus('剪贴板为空', 'error');
                    return;
                }
                shareInput.value = txt.trim();
                setStatus('已粘贴剪贴板内容', 'success');
            } catch {
                shareInput.focus();
                setStatus('读取剪贴板失败，请手动粘贴', 'error');
            }
        });
        copyLinkBtn.addEventListener('click', async () => {
            const data = state.parsed && state.parsed.data ? state.parsed.data : null;
            const ok = await copyText(data && data.video_url ? data.video_url : '');
            setStatus(ok ? '已复制视频链接' : '复制失败', ok ? 'success' : 'error');
        });
        copyTextBtn.addEventListener('click', async () => {
            const data = state.parsed && state.parsed.data ? state.parsed.data : null;
            const txt = buildCaptionText(data);
            const ok = await copyText(txt);
            setStatus(ok ? '已复制文案' : '复制失败', ok ? 'success' : 'error');
        });
        publishBtn.addEventListener('click', publish);
        extractAudioToHomeBtn.addEventListener('click', extractAudioToHome);
        publishTextToHomeBtn.addEventListener('click', publishCaptionToHome);

        shareInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') parse();
        });

        loadConfig();
        syncConfigToggleLabel();
    </script>
</body>
</html>
